<body class="bg-surface text-text-primary font-body antialiased min-h-screen flex flex-col items-center">
<!-- TopAppBar (Transactional - Hidden Nav, Kept for Back Action & Brand) -->
<header class="w-full max-w-[480px] mx-auto flex items-center px-container-padding h-11 border-b border-border-base bg-surface">
<button class="mr-sm text-text-primary hover:bg-bg-subtle p-xs rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-h1 text-h1 text-text-primary flex-1 text-center pr-[32px]">Meest&amp;Returns</span>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[480px] flex-1 flex flex-col px-container-padding py-xl pb-[100px]">
<!-- Header Section -->
<div class="mb-xl text-center">
<h1 class="font-display text-display text-text-primary mb-sm">Przygotuj paczkę</h1>
<p class="font-body text-body text-error font-medium">Zwrot zostanie odrzucony jeśli paczka nie spełnia wymagań</p>
</div>
<!-- Requirements List (Bento-style stacked cards) -->
<div class="flex flex-col gap-form-gap mb-xxl">
<!-- Requirement 1 -->
<div class="flex items-start gap-md p-md bg-surface-container-lowest border border-border-base rounded-lg hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-shadow">
<div class="flex-shrink-0 w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="sell">sell</span>
</div>
<div class="flex-1 pt-unit">
<p class="font-body text-body text-text-primary font-medium">Metki oryginalne nieuszkodzone</p>
</div>
</div>
<!-- Requirement 2 -->
<div class="flex items-start gap-md p-md bg-surface-container-lowest border border-border-base rounded-lg hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-shadow">
<div class="flex-shrink-0 w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="local_mall">local_mall</span>
</div>
<div class="flex-1 pt-unit">
<p class="font-body text-body text-text-primary font-medium">Produkt w worku foliowym (możesz użyć torby z zakupów)</p>
</div>
</div>
<!-- Requirement 3 -->
<div class="flex items-start gap-md p-md bg-surface-container-lowest border border-border-base rounded-lg hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-shadow">
<div class="flex-shrink-0 w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="inventory_2">inventory_2</span>
</div>
<div class="flex-1 pt-unit">
<p class="font-body text-body text-text-primary font-medium">Bez oryginalnego pudełka — tylko produkt w worku</p>
</div>
</div>
</div>
</main>
<!-- Sticky Bottom Action Area -->
<div class="fixed bottom-0 w-full max-w-[480px] bg-surface border-t border-border-base p-container-padding z-40">
<!-- Confirmation Checkbox -->
<label class="flex items-center gap-sm mb-md cursor-pointer group">
<div class="relative flex items-center justify-center w-5 h-5 rounded border border-outline bg-surface-container-lowest group-hover:border-success transition-colors">
<input class="opacity-0 absolute inset-0 cursor-pointer w-full h-full z-10" id="confirm-requirements" type="checkbox"/>
<!-- Custom Checkmark (Visible when checked via CSS ideally, simplified for visual representation here) -->
<span class="material-symbols-outlined text-[16px] text-surface-container-lowest opacity-0 transition-opacity" data-icon="check" data-weight="fill" id="check-icon" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-small text-small text-text-primary font-medium select-none">Potwierdzam, że paczka spełnia wymagania</span>
</label>
<!-- CTA Button (Visually styled as disabled initially) -->
<button class="w-full h-[44px] rounded-lg bg-surface-container-high text-text-muted font-body text-body font-medium flex items-center justify-center transition-colors select-none pointer-events-none" id="generate-btn">
            Wygeneruj kod QR
        </button>
</div>
