<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body antialiased">
<!-- TopNavBar JSON Mapping -->
<header class="bg-surface dark:bg-surface-container-highest text-primary dark:text-on-surface flex justify-between items-center h-[56px] px-md w-full max-w-[768px] mx-auto border-b border-border-base docked full-width top-0">
<div class="flex flex-col">
<span class="font-h1 text-h1 font-bold text-primary dark:text-on-surface">Meest&amp;Returns Operator</span>
<span class="font-small text-small text-on-surface-variant">Żabka #4822</span>
</div>
<div class="flex items-center gap-md">
<span class="font-small text-small text-on-surface-variant hidden sm:inline">Zalogowany: Jan Kowalski</span>
<button class="flex items-center gap-xs font-small text-small text-primary hover:bg-surface-container-low transition-colors px-sm py-xs rounded active:opacity-80 transition-opacity">
<span>Wyloguj</span>
<span class="material-symbols-outlined text-[20px]" data-icon="logout">logout</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow w-full max-w-[768px] mx-auto px-md py-lg flex flex-col gap-lg pb-xxxl">
<!-- Massive Primary Action -->
<button class="w-full bg-success text-on-primary h-[80px] rounded-lg shadow-[0_4px_12px_rgba(0,0,0,0.05)] flex items-center justify-center gap-md active:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-[32px]" data-icon="qr_code_scanner" data-weight="fill" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-display text-display uppercase">SKANUJ KOD ZWROTU</span>
</button>
<!-- Stats Card Row -->
<div class="grid grid-cols-1 sm:grid-cols-3 gap-md">
<!-- Stat 1 -->
<div class="bg-surface-container-lowest border border-border-base rounded-lg p-md flex flex-col gap-xs hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-shadow">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wide">Dziś przyjęto</span>
<span class="font-technical text-technical text-h1 font-bold text-primary">12</span>
</div>
<!-- Stat 2 -->
<div class="bg-surface-container-lowest border border-border-base rounded-lg p-md flex flex-col gap-xs hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-shadow">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wide">W tym worku</span>
<span class="font-technical text-technical text-h1 font-bold text-primary">8</span>
</div>
<!-- Stat 3 (Progress/Alert) -->
<div class="bg-badge-dropped-bg border border-warning/20 rounded-lg p-md flex flex-col gap-xs hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-shadow">
<div class="flex items-center justify-between">
<span class="font-label-caps text-label-caps text-on-tertiary-fixed-variant uppercase tracking-wide">Worek pełny</span>
<span class="material-symbols-outlined text-[16px] text-warning" data-icon="warning" data-weight="fill" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div class="flex items-baseline gap-xs">
<span class="font-small text-small text-on-tertiary-fixed-variant">za</span>
<span class="font-technical text-technical text-h1 font-bold text-on-tertiary-fixed-variant">2</span>
<span class="font-small text-small text-on-tertiary-fixed-variant">paczki</span>
</div>
<!-- Simple progress bar -->
<div class="w-full bg-warning/20 h-[4px] rounded-full mt-sm overflow-hidden">
<div class="bg-warning h-full rounded-full" style="width: 80%"></div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar JSON Mapping -->
<nav class="bg-surface dark:bg-surface-container-high text-primary dark:text-on-surface border-t border-border-base docked full-width bottom-0 fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-[64px] bg-surface md:hidden">
<!-- Active Tab: Pulpit (Mapped conceptually to 'Skanuj' context given the intent, but strictly using JSON labels) -->
<button class="flex flex-col items-center justify-center text-primary dark:text-secondary-fixed-dim font-bold active:bg-surface-container active:scale-95 transition-all w-full h-full">
<span class="material-symbols-outlined text-[24px] text-success" data-icon="qr_code_scanner" data-weight="fill" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-label-caps text-label-caps text-success mt-xs">Skanuj</span>
</button>
<!-- Inactive Tabs -->
<button class="flex flex-col items-center justify-center text-on-surface-variant active:bg-surface-container active:scale-95 transition-all w-full h-full">
<span class="material-symbols-outlined text-[24px]" data-icon="home">home</span>
<span class="font-label-caps text-label-caps mt-xs">Pulpit</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant active:bg-surface-container active:scale-95 transition-all w-full h-full">
<span class="material-symbols-outlined text-[24px]" data-icon="package_2">package_2</span>
<span class="font-label-caps text-label-caps mt-xs">Batch</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant active:bg-surface-container active:scale-95 transition-all w-full h-full">
<span class="material-symbols-outlined text-[24px]" data-icon="person">person</span>
<span class="font-label-caps text-label-caps mt-xs">Profil</span>
</button>
</nav>
</body></html>
