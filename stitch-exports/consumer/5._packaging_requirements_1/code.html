<body class="bg-background text-text-primary font-body antialiased min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-container-high border-b border-border-base dark:border-outline-variant flex items-center px-container-padding h-11 w-full max-w-[480px] mx-auto sticky top-0 z-50">
<button aria-label="Wróć" class="text-text-primary dark:text-on-surface hover:bg-bg-subtle dark:hover:bg-surface-variant p-sm -ml-sm rounded-full transition-opacity active:opacity-80 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<div class="flex-1 flex justify-center pr-8">
<span class="font-display text-[18px] font-bold text-primary dark:text-inverse-primary tracking-tight">Meest&amp;Returns</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[480px] px-container-padding py-lg flex flex-col flex-grow">
<!-- Header Section -->
<section class="mb-xl">
<h1 class="font-display text-[28px] leading-tight font-bold text-text-primary mb-md">Przygotuj paczkę</h1>
<!-- Critical Subheading -->
<div class="bg-error-container/30 border border-error-container rounded-lg p-md flex items-start gap-md">
<span class="material-symbols-outlined text-error mt-0.5" data-weight="fill" style="font-size: 20px;">warning</span>
<p class="font-small text-small text-on-surface-variant">Zwrot zostanie odrzucony jeśli paczka nie spełnia wymagań</p>
</div>
</section>
<!-- Requirements Bento Grid / List -->
<section class="flex flex-col gap-sm mb-section-gap">
<!-- Requirement Card 1 -->
<div class="bg-surface-container-low border border-border-base rounded-lg p-md flex items-center gap-md">
<div class="w-10 h-10 shrink-0 rounded-full bg-surface flex items-center justify-center border border-border-base">
<span class="material-symbols-outlined text-text-secondary" style="font-size: 20px;">local_offer</span>
</div>
<p class="font-body text-body text-text-primary">Metki oryginalne nieuszkodzone</p>
</div>
<!-- Requirement Card 2 -->
<div class="bg-surface-container-low border border-border-base rounded-lg p-md flex items-center gap-md">
<div class="w-10 h-10 shrink-0 rounded-full bg-surface flex items-center justify-center border border-border-base">
<span class="material-symbols-outlined text-text-secondary" style="font-size: 20px;">shopping_bag</span>
</div>
<p class="font-body text-body text-text-primary">Produkt w worku foliowym</p>
</div>
<!-- Requirement Card 3 -->
<div class="bg-surface-container-low border border-border-base rounded-lg p-md flex items-center gap-md">
<div class="w-10 h-10 shrink-0 rounded-full bg-surface flex items-center justify-center border border-border-base">
<span class="material-symbols-outlined text-text-secondary" style="font-size: 20px;">inventory_2</span>
</div>
<p class="font-body text-body text-text-primary">Bez oryginalnego pudełka — tylko produkt w worku</p>
</div>
</section>
<!-- Bottom Action Area -->
<section class="mt-auto pt-lg">
<!-- Confirmation Checkbox -->
<label class="flex items-start gap-md p-md bg-bg-subtle rounded-lg border border-border-base cursor-pointer mb-lg transition-colors hover:bg-surface-container-high">
<div class="flex items-center h-5 mt-0.5">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary focus:ring-offset-0 bg-surface cursor-pointer" type="checkbox"/>
</div>
<span class="font-small text-small text-text-primary flex-1">Potwierdzam, że paczka spełnia wymagania</span>
</label>
<!-- CTA Button (Disabled State) -->
<button class="w-full h-[44px] rounded-DEFAULT bg-surface-variant border border-outline-variant text-text-muted font-body text-body font-medium flex items-center justify-center cursor-not-allowed" disabled="">
                Wygeneruj kod QR
            </button>
</section>
