<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-bg-subtle text-text-primary min-h-screen flex items-center justify-center p-md">
<!-- Main Container -->
<main class="w-full max-w-[480px] md:max-w-[768px] mx-auto">
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-border-base rounded-lg p-container-padding md:p-xl flex flex-col gap-section-gap">
<!-- Header Section -->
<div class="flex flex-col items-center gap-md text-center">
<div class="font-h1 text-h1 font-bold text-text-primary">Meest&amp;Returns</div>
<h1 class="font-h2 text-h2 text-text-secondary">Punkt odbioru zwrotów</h1>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-lg">
<!-- Point Code Input -->
<div class="flex flex-col gap-sm">
<label class="font-small text-small text-text-secondary" for="pointCode">Kod punktu</label>
<input class="h-[56px] w-full border border-border-base rounded bg-surface-container-lowest px-md font-technical text-[24px] tracking-[0.2em] text-center text-text-primary focus:outline-none focus:border-success focus:border-[2px] transition-colors" id="pointCode" maxlength="4" name="pointCode" placeholder="0000" required="" type="text"/>
</div>
<!-- Operator PIN Input -->
<div class="flex flex-col gap-sm">
<label class="font-small text-small text-text-secondary" for="operatorPin">PIN operatora</label>
<input class="h-[56px] w-full border border-border-base rounded bg-surface-container-lowest px-md font-technical text-[24px] tracking-[0.2em] text-center text-text-primary focus:outline-none focus:border-success focus:border-[2px] transition-colors" id="operatorPin" maxlength="4" name="operatorPin" placeholder="••••" required="" type="password"/>
</div>
<!-- Submit Button -->
<button class="h-[44px] w-full bg-primary text-on-primary font-small text-small rounded flex items-center justify-center gap-sm mt-md hover:bg-surface-tint transition-colors" type="submit">
                    Zaloguj
                </button>
</form>
<!-- Footer / Support -->
<div class="text-center mt-auto">
<p class="font-small text-small text-text-muted">
                    Problem z logowaniem? <span class="text-text-primary">+48 22 000 00 00</span>
</p>
</div>
</div>
</main>
</body></html>
