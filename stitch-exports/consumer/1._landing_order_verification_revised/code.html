<header class="fixed top-0 w-full z-50 flex items-center justify-between px-md h-[60px] max-w-[480px] mx-auto bg-surface-container-lowest">
<div class="flex items-center">
<img alt="Meest&amp;Returns Logo" class="h-8 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uhB1CRSIz-okvq7rdbjrvezhzyDxD9e5kJmaFXIu8k7RyZ1GAX-N0lyR4qS7LoWUBILVr_6FQ877Y7ESLvgy2F7aTZAi1SRIETNN9jgNnSvDe_1ymDOgNJbSUlmmtv6-PfjTNM6ZPPwskek0KbTBm1vB14e85z9lwnvL_hb_rzXYSX47VAlc8P55BVbZhmp4RN9Vd5wkHbFR7uW2FEh8DrqSmawv87RgxCFafbRiNdiFEcygUn8xOnopUvy"/>
</div>

<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-container-padding pt-[100px] pb-lg">
<!-- Hero Text -->
<div class="mb-section-gap">
<h1 class="font-h1 text-h1 text-text-primary mb-xs">Zwróć zamówienie w 30 sekund</h1>
<p class="font-body text-body text-text-secondary">Bez drukowania etykiet, bez pakowania</p>
</div>
<!-- Form Area -->
<div class="flex flex-col gap-form-gap mb-section-gap">
<div class="flex flex-col gap-xs">
<label class="font-small text-small text-text-primary" for="order-number">Numer zamówienia</label>
<input class="h-[44px] px-md rounded-lg border border-border-base bg-surface-container-lowest font-body text-body text-text-primary focus:outline-none focus:ring-0 focus:border-[2px] focus:border-success transition-colors w-full placeholder:text-text-muted" id="order-number" placeholder="MOD-2026-0042893" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-small text-small text-text-primary" for="order-email">Email z zamówienia</label>
<input class="h-[44px] px-md rounded-lg border border-border-base bg-surface-container-lowest font-body text-body text-text-primary focus:outline-none focus:ring-0 focus:border-[2px] focus:border-success transition-colors w-full placeholder:text-text-muted" id="order-email" placeholder="twoj@email.pl" type="email"/>
</div>
<button class="h-[44px] mt-sm rounded-lg bg-text-primary text-on-primary font-small text-small font-medium hover:bg-black transition-colors flex items-center justify-center w-full">
                    Znajdź zamówienie
                </button>
<div class="text-center mt-xs">
<span class="font-label-caps text-label-caps text-text-muted">Zwroty obsługiwane przez sieć Meest Box</span>
</div>
</div>
<!-- Spacer to push trust signals to bottom -->
<div class="flex-1"></div>

<div class="flex flex-col gap-sm border-t border-border-base pt-lg">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-[20px] text-text-secondary" style="font-variation-settings: 'FILL' 0;">location_on</span>
<span class="font-small text-small text-text-primary">1,350 punktów w Polsce</span>
</div>
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-[20px] text-text-secondary" style="font-variation-settings: 'FILL' 0;">schedule</span>
<span class="font-small text-small text-text-primary">Zwrot środków 24h</span>
</div>
