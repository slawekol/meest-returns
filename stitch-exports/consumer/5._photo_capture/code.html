<body class="bg-primary text-on-primary font-body antialiased min-h-screen flex flex-col items-center justify-center">
<!-- Main Application Container (Tablet Optimized max-width) -->
<main class="w-full max-w-[768px] h-[1024px] flex flex-col relative overflow-hidden bg-[#0F172A]">
<!-- Top Action Bar (Task Focused - No Global Nav) -->
<header class="flex items-center justify-between p-lg z-10 bg-gradient-to-b from-[#0F172A] to-transparent">
<button class="w-[44px] h-[44px] rounded-full flex items-center justify-center bg-white/10 hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-on-primary">close</span>
</button>
<div class="flex space-x-sm">
<span class="material-symbols-outlined text-on-primary">flash_off</span>
</div>
</header>
<!-- Header Content -->
<div class="px-lg pt-sm pb-xl z-10 text-center">
<h1 class="font-h1 text-h1 text-on-primary mb-xs">Zrób zdjęcie paczki</h1>
<p class="font-body text-body text-outline-variant">Pokazuje stan paczki przy przyjęciu</p>
</div>
<!-- Viewfinder Canvas -->
<div class="flex-1 flex flex-col items-center justify-center px-lg relative z-0">
<!-- Central Square Viewfinder -->
<div class="w-full max-w-[400px] aspect-square relative rounded-lg overflow-hidden border border-outline/30 shadow-2xl">
<!-- Camera Feed Simulation (Image) -->
<img alt="Live camera feed" class="w-full h-full object-cover grayscale-[20%]" data-alt="A close-up view of a standard brown corrugated cardboard shipping box resting on a metal warehouse sorting table. The image is taken from a slightly top-down perspective, simulating a live smartphone camera feed. Bright, cool fluorescent lighting illuminates the scene, casting soft shadows. A partially visible white shipping label is affixed to the top of the box. The visual style is highly realistic, industrial, and utilitarian, fitting a logistics application interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCij8InFRZuuKoRj-ghN47R-KpZs7MJm9ePSt3ZE7sfSBT-FqmLItAl4CnYED94TEvtOz4sHDRIPtwvfPhh6E7JOqEdR6IAu7_dol8dHARuxUUHwYFL_VjNw9E8-iVv9QLhkQnXbu40POWXOndaQA1cVIdLnpAAdjC70oz8Z0S87uu0YNgkyMDJOoS7c7xxA5Qx7VoTUJwfqx4bel5O5djg2Ccqvv9KOSGC8pn_91o7ZFubor7O4jQkoQieVMPQL3SRu0drpGQwU3WX"/>
<!-- Viewfinder Corner Accents -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-success m-md rounded-tl-sm"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-success m-md rounded-tr-sm"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-success m-md rounded-bl-sm"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-success m-md rounded-br-sm"></div>
<!-- Center Focus Reticle -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-12 h-12 border border-white/50 rounded-full flex items-center justify-center">
<div class="w-1 h-1 bg-success rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Bottom Controls Area -->
<div class="w-full p-lg pb-xxxl bg-gradient-to-t from-[#0F172A] via-[#0F172A]/90 to-transparent z-10 flex flex-col space-y-xl">
<!-- Capture State (Shutter & Thumbnail) -->
<div class="flex items-center justify-between px-md">
<!-- Preview Thumbnail -->
<div class="w-[56px] h-[56px] rounded-DEFAULT border-2 border-outline-variant overflow-hidden bg-surface-container relative">
<img alt="Thumbnail preview" class="w-full h-full object-cover" data-alt="A small, square thumbnail image showing a slightly blurry brown cardboard box in a warehouse setting. The image serves as a tiny visual preview of a recently captured photo within a dark UI layout." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6gAyKmQKm9aTs96pnArXFY_xKTR6aiructBEnel83LiD6tDOyYsXSob8DmMhgRf2jZ6C5PWAnkuKzbTdoPZUA8Ra11V_55PkA8YskmgE_9LZ4YJvZZFruMsrzENwvaruiQ7igRaOdP1gC2vUEER50kF1kUkOUvmp6n4IE90v575tov_k7PkoXe82t3ONSQhzVOp6TN03DktlFswuoCPcsjjKKODm8rV27YpRSidlP-ytC8h08TlJ3KVII2sgitiqbQo00c1YT97AC"/>
<!-- Notification Badge -->
<div class="absolute -top-1 -right-1 w-4 h-4 bg-success rounded-full border-2 border-[#0F172A]"></div>
</div>
<!-- Massive 80px Circular Shutter Button -->
<button class="w-[80px] h-[80px] rounded-full border-4 border-outline-variant flex items-center justify-center hover:scale-95 transition-transform active:bg-white/10 group">
<div class="w-[64px] h-[64px] bg-white rounded-full group-hover:bg-gray-200 transition-colors shadow-[0_0_15px_rgba(255,255,255,0.3)]"></div>
</button>
<!-- Spacer to balance thumbnail -->
<div class="w-[56px] h-[56px]"></div>
</div>
<!-- Post-Capture Flow Simulation (Review Buttons) -->
<div class="flex flex-col sm:flex-row gap-form-gap mt-md pt-lg border-t border-outline/20">
<button class="flex-1 min-h-[44px] px-lg py-[12px] bg-transparent border border-outline-variant text-on-primary font-body text-body rounded-DEFAULT hover:bg-white/5 transition-colors flex items-center justify-center space-x-sm">
<span class="material-symbols-outlined text-[20px]">refresh</span>
<span>Zrób ponownie</span>
</button>
<button class="flex-1 min-h-[44px] px-lg py-[12px] bg-success text-on-primary font-body text-body font-semibold rounded-DEFAULT hover:bg-success/90 transition-colors shadow-[0_4px_12px_rgba(16,185,129,0.2)] flex items-center justify-center space-x-sm">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
<span>Użyj zdjęcia</span>
</button>
</div>
</div>
</main>
</body></html>
